    modes_desc: "<ul class=\"list-disc pl-5 space-y-2.5 leading-relaxed\"><li><strong>EML 一括：</strong> 大量テンプレート送信に最適です。<code class=\"bg-white dark:bg-slate-950 px-1 py-0.5 rounded border border-slate-200 dark:border-slate-800\">.eml</code> ファイルが格納されたフォルダを読み込み、安全かつネイティブに連続送信します。</li><li><strong>単一添付：</strong> 指定した1つのテキストやファイルを対象とし、ターゲットリスト向けに同一のメールを構築します（送信者/受信者/件名/本文等の標準設定が必要）。</li><li><strong>フォルダ添付：</strong> 指定したディレクトリ内のすべてのファイルを順番に添付ファイルとして取得し一括送信します。</li></ul>"
    adv_title: "3. 高度な処理と高並行パフォーマンスの調整"
    adv_desc: "<p class=\"leading-relaxed\">大容量キューの実行時、RSendMail は非同期マルチスレッドエンジンで並行処理を行います。ネットワークのIP制限を回避するため、<strong>プロセス数</strong>または<strong class=\"text-indigo-600 dark:text-indigo-400\">バッチサイズ</strong>を変更して同時送信数を制御できます。送信元のプライバシー保護が求められるシナリオでは、<strong>メールを匿名化</strong>オプションを有効にすることでネイティブなドメイン匿名ルーティングを実現できます。</p>"
    loop_title: "4. 無限ループとフェイルオーバーエンジン"
    loop_desc: "<p class=\"leading-relaxed\"><strong>無限ループ</strong>のチェックを外すと、厳密な<strong>繰り返し回数</strong>を指定できます。エンジンは設定回数の送信が完了するとリソースを回収し、安全にプロセスを停止します。<strong>ループ間隔</strong>は、再送開始前のバッファを提供してプロバイダー側のAPI制限を防ぎます。サーバー側の不可逆なネットワーク遅延が発生した場合は、<strong>リトライ間隔</strong>がハートビート再試行をサポートします。</p>"

