  infinite_loop_round: "無限ループモード：ラウンド %{round} を開始"
  interrupted: "中断シグナルを受信、正常に終了中..."
  loop_interrupted: "無限ループがユーザーにより中断されました"

# ===== CLI ログメッセージ =====
cli_logging:
  create_log_file_failed: "ログファイルの作成に失敗 %{path}: %{error}"
  init_log_failed: "ログの初期化に失敗: %{error}"
  log_to_console_and_file: "コンソールとファイルの両方にログ出力: %{path}"

