# RSendMail - 日本語 (ja-JP) 翻訳
# このファイルには RSendMail アプリケーションのすべての翻訳キーが含まれています

# ===== CLI 引数とヘルプ =====
cli:
  about: "高性能バルクメール送信 CLI ツール"
  smtp_server: "SMTP サーバーアドレス"
  port: "SMTP サーバーポート"
  from: "送信者メールアドレス（EMLモードではオプション、EMLファイルのFromヘッダーから取得）"
  to: "受信者メールアドレス、複数はカンマ区切り（EMLモードではオプション、EMLファイルのToヘッダーから取得；--envelope-cc-bcc でCc/Bccも含む）"
  dir: "メールファイルのディレクトリ"
  extension: "メールファイルの拡���子"
  processes: "プロセス数（auto で CPU コア数に自動設定、または数値を指定）"
  batch_size: "SMTP セッションごとの連続送信メール数"
  smtp_timeout: "SMTP セッションタイムアウト（秒）"
  log_level: "ログレベル（error/warn/info/debug/trace）"
  keep_headers: "元のメールヘッダーを保持"
  anonymize_emails: "メールアドレスを匿名化"
  anonymize_domain: "匿名化ドメイン（例：example.com）、匿名化後はランダム文字@domain"
  modify_headers: "--from と --to パラメータでメールヘッダーの From と To を変更"
  loop: "無限ループで送信（ユーザーが中断するまで）"
  repeat: "送信繰り返し回数"
  loop_interval: "ループ送信の間隔時間（秒）"
  retry_interval: "送信失敗後のリトライ間隔（秒）"
  attachment: "添付ファイルパス（単一添付モード用）"
  attachment_dir: "添付ディレクトリパス（ディレクトリ内の各ファイルを個別メールとして送信）"
  subject_template: "件名テンプレート（{filename} 変数をサポート）"
  text_template: "テキストコンテンツテンプレート（{filename} 変数をサポート）"
  html_template: "HTML コンテンツテンプレート（{filename} 変数をサポート）"
  email_send_interval_ms: "各メール送信間隔（ミリ秒）"
  auth_mode: "アカウントログインモードを使用（ユーザー名とパスワードで認証）"
  username: "認証用ユーザー名（auth_mode=true の場合に必要）"
  password: "認証用パスワード（auth_mode=true の場合に必要）"
  use_tls: "TLS 暗号化接続を使用（ポート 465 で自動有効化）"
  accept_invalid_certs: "無効な証明書を受け入れる"
  failed_emails_dir: "送信失敗した EML ファイルの保存ディレクトリ"
  log_file: "ログファイルパス（指定時はコンソールとファイル両方に出力）"
  envelope_cc_bcc: "EML モードで Cc/Bcc 受信者も SMTP RCPT TO に含める"
  lang: "表示言語（en/zh-CN/zh-TW/ja）"

# ===== コアライブラリ - メーラーメッセージ =====
core:
  mailer:
    # 接続メッセージ
    connecting_smtp: "SMTP サーバーに接続中: %{server}:%{port}"
    smtp_timeout: "SMTP 接続タイムアウト"
    smtp_timeout_mode: "SMTP 接続タイムアウト（%{mode}）"
    smtp_connect_failed: "SMTP 接続失敗: %{error}"
    smtp_connect_failed_mode: "SMTP 接続失敗（%{mode}）: %{error}"
    smtp_auth_connect_failed: "SMTP 認証接続失敗: %{error}"
    smtp_auth_timeout: "SMTP 認証接続タイムアウト"
    using_tls: "TLS 接続を使用（%{mode}）"
    using_plain: "Plain 接続を使用（%{mode}）"
    using_account_login: "アカウントログインモードを使用: %{username}"
    auth_mode_no_tls: "非 TLS 接続でのアカウントログインはサポートされていません。--use-tls を設定するかポート 465 を使用してください"
    auth_mode_missing_credentials: "アカウントログインモードが有効ですが、ユーザー名またはパスワードがありません"

    # 添付モードメッセージ
    detecting_attachment_dir: "添付ディレクトリモードを検出：%{dir}"
    detecting_attachment: "添付モードを検出：%{path}"
    preparing_attachment_dir: "ディレクトリ内のすべてのファイルを添付として送信準備中：%{dir}"
    preparing_attachment: "添付ファイルの送信準備中：%{path}"
    scanning_directory: "ディレクトリ内のファイルをスキャン中: %{dir}"
    found_files: "送信用に %{count} 個のファイルを検出"
    directory_empty: "ディレクトリが空です、送信するファイルがありません"
    attachment_dir_not_exist: "添付ディレクトリが存在しないか、ディレクトリではありません: %{dir}"
    attachment_not_exist: "添付ファイルが存在しません: %{path}"

    # 送信メッセージ
    auto_process_count: "プロセス数を自動設定: %{count}"
    using_process_count: "指定されたプロセス数を使用: %{count}"
    process_group_complete: "プロセスグループ %{id} 完了"
    process_group_interrupted: "プロセスグループ %{id} が中断シグナルを受信、終了中..."
    process_group_sending: "プロセスグループ %{id}: バッチ %{current}/%{total} を送信中、ファイル: %{file}"
    process_group_tls_failed: "プロセスグループ %{id}: TLS バッチ送信失敗: %{error}"
    process_group_auth_failed: "プロセスグループ %{id}: SMTP 認証接続失敗: %{error}"
    process_group_auth_timeout: "プロセスグループ %{id}: SMTP 認証接続タイムアウト"
    process_group_no_tls_auth: "プロセスグループ %{id}: 認証モードは非 TLS 接続をサポートしていません。"
    process_group_missing_auth: "プロセスグループ %{id}: 認証モードにユーザー名またはパスワードがありません。"
    process_group_using_tls: "プロセスグループ %{id}: 非認証モード、TLS 接続を使用（非永続化）"
    process_group_non_auth_tls_failed: "プロセスグループ %{id}: SMTP 非認証 TLS 接続失敗: %{error}"
    process_group_non_auth_tls_timeout: "プロセスグループ %{id}: SMTP 非認証 TLS 接続タイムアウト"
    process_group_using_plain: "プロセスグループ %{id}: 非認証モード、plain 接続を使用（永続化セッション、バッチ: %{batch}）"
    process_group_plain_timeout: "プロセスグループ %{id}: SMTP 接続タイムアウト（非認証 Plain）。"
    process_group_send_interval_interrupted: "プロセスグループ %{id}: メール送信間隔スリープが中断されました（バッチメール %{current}/%{total}）"
    task_interval_interrupted: "プロセスグループ %{id}: タスク間隔スリープが中断されました（ファイル %{current}/%{total}）"
    process_group_plain_connect_failed: "プロセスグループ %{id}: SMTP 接続失敗（非認証 Plain）: %{error}"
    process_group_connection_reset_needed: "プロセスグループ %{id}: 接続リセットが必要な SMTP エラーを検出（例: 421）、直ちに接続をリセット"
    process_group_batch_size_1_close: "プロセスグループ %{id}: batch-size=1、次のバッチで新しい接続を確保するため強制的に接続を閉じます"
    process_group_smtp_unavailable: "プロセスグループ %{id}（非認証 Plain）：SMTP 接続が利用不可、現在のバッチをスキップ"
    process_group_batch_interval: "プロセスグループ %{id}: バッチ処理完了。%{ms}ms 待機中（現在のファイルインデックス %{current}/%{total}）"
    process_group_interval_interrupted: "プロセスグループ %{id}: 中断シグナルを受信、タスク間隔後に終了（ファイル %{current}/%{total}）"

    # メール処理
    set_sender_failed: "送信者の設定に失敗: %{error}"
    set_sender_failed_for: "%{path} の送信者設定に失敗: %{error}"
    set_recipient_success: "%{path} の受信者 %{recipient} を正常に設定"
    set_recipient_failed: "受信者 %{recipient} の設定に失敗: %{error}"
    set_recipient_failed_for: "%{path} の受信者 %{recipient} 設定に失敗: %{error}"
    all_recipients_failed: "すべての受信者の設定に失敗、%{path} のメール送信をスキップ"
    using_eml_from: "EML ファイルの送信者アドレスを使用: %{addr} for %{path}"
    extract_from_failed: "EML ファイルから送信者アドレスを抽出できません: %{path}"
    using_eml_recipients: "EML ファイルの受信者アドレスを使用: %{addrs} for %{path}"
    no_valid_recipients: "有効な受信者アドレスがありません for %{path}: %{to}"
    connection_error_detected: "接続リセットが必要な SMTP エラーを検出: %{error}"
    data_connection_error: "データ送信時に接続問題を検出: %{error}"
    rset_command: "RSET コマンドを送信して SMTP 状態をリセット（バッチメール %{current}/%{total}）"
    rset_command_failed: "RSET コマンド送信失敗（バッチメール %{current}/%{total}）: %{error}"
    waiting_next_email: "次のメール送信まで %{ms}ms 待機（バッチメールインデックス: %{current}/%{total}）"
    email_interval_interrupted: "メール送信間隔スリープが中断されました（バッチメール %{current}/%{total}）"
    email_interval_exit: "中断シグナルを受信、メール間隔後にバッチ処理を終了（バッチメール %{current}/%{total}）"
    read_attachment_failed: "添付ファイルの読み取りに失敗: %{error}"
    read_attachment_failed_for: "%{path} の添付ファイル読み取りに失敗: %{error}"
    build_email_failed: "メールコンテンツの生成に失敗: %{error}"
    build_email_failed_for: "%{path} のメールコンテンツ生成に失敗: %{error}"
    email_send_success: "メール送信成功！: %{path}"
    email_send_failed: "メール送信失敗: %{error}"
    email_send_failed_for: "%{path} のメール送信失敗: %{error}"
    email_send_timeout: "メール送信タイムアウト"
    email_send_timeout_for: "%{path} のメール送信タイムアウト"
    attachment_email_success: "添付メール送信成功！ファイル: %{file}"
    attachment_email_success_path: "添付メール送信成功！Path: %{path}"

    # EML 処理
    using_attachment_mode: "添付モードを使用、メールファイルスキャンをスキップ"
    scanning_eml_directory: "ディレクトリをスキャン中: %{dir}"
    found_eml_files: "%{count} 個のメールファイルを検出"
    anonymizing_email: "メールコンテンツのメールアドレスを匿名化中: %{path}"
    read_file_failed: "ファイル %{path} の読み取りに失敗: %{error}"
    parse_email_failed: "メールファイルの解析に失敗: %{path}"
    using_original_headers: "元のメールヘッダーでメールを送信: %{path}"
    modifying_headers: "メールヘッダーを変更してメールを送信: %{path}"
    using_original_content: "元のメールコンテンツを使用して送信（添付と MIME 構造を保持）: %{path}"
    batch_complete: "バッチ %{current}/%{total} 完了、%{count} 通のメールを送信"
    send_interval_interrupted: "メール送信間隔スリープが中断されました（バッチメール %{current}/%{total}）"
    error_read_file: "ファイル読み取り失敗: %{error}"
    error_parse_email: "メールファイルの解析に失敗"
    error_no_from: "EML ファイルから送信者アドレスを抽出できません"
    error_no_recipients: "有効な受信者アドレスがありません: %{to}"
    error_set_sender: "送信者の設定に失敗: %{error}"
    error_set_recipient: "受信者 %{recipient} の設定に失敗: %{error}"
    error_build_email: "メールコンテンツの生成に失敗: %{error}"
    error_send_failed: "メール送信失敗: %{error}"
    error_send_timeout: "メール送信タイムアウト"
    error_tls_batch: "TLS バッチ処理エラー: %{error}"
    error_auth_connect_failed: "SMTP 認証接続失敗"
    error_auth_connect_timeout: "SMTP 認証接続タイムアウト"
    error_auth_requires_tls: "認証失敗: TLS が必要"
    error_auth_missing_credentials: "認証失敗: 認証情報が不完全"
    error_non_auth_tls_batch: "非認証 TLS バッチ処理エラー: %{error}"
    error_non_auth_tls_failed: "SMTP 非認証 TLS 接続失敗"
    error_non_auth_tls_timeout: "SMTP 非認証 TLS 接続タイムアウト"
    error_plain_connect_failed: "SMTP 接続失敗（Plain）"
    error_plain_timeout: "SMTP 接続タイムアウト（Plain）"

    # 失敗メール処理
    create_failed_dir_error: "失敗メール保存ディレクトリの作成に失敗 %{dir}: %{error}"
    saved_failed_email: "失敗メールを保存しました: %{source} -> %{dest}"
    save_failed_email_error: "失敗メールの保存中にエラー %{source} -> %{dest}: %{error}"

    # 中断処理
    interrupted: "中断シグナルを受信、終了中..."
    interrupted_gracefully: "中断シグナルを受信、正常に終了中..."
    send_batch_interrupted: "send_batch_emails: 中断シグナルを受信、バッチ処理を終了中..."
    execute_send_interrupted: "execute_send_logic: 中断シグナルを受信、終了中..."
    attachment_dir_interval_interrupted: "添付ディレクトリモード：送信間隔スリープが中断されました（ファイル %{current}/%{total}）"
    waiting_next_batch: "次のバッチを待機中、現在の進捗: %{current}/%{total}"

    # 接続問題
    connection_problem_detected: "接続問題を検出、接続をリセット中"
    rset_failed: "RSET コマンド失敗: %{error}"
    connection_reset: "接続がリセットされました、次のメールで再接続します"
    batch_send_failed_reconnecting: "バッチ送信失敗: %{error}、再接続を試みます"
    batch_failed_unrecoverable: "バッチ送信失敗（回復不可）: %{error}"

  # 統計表示文字列
  stats:
    report_title: "メール送信統計レポート"
    separator: "==================="
    basic_stats: "1. 基本統計"
    total_processed: "    処理総数: %{count} 通"
    success_sent: "    送信成功: %{count} 通"
    total_failed: "    失敗総数: %{count} 通"
    error_classification: "2. エラー分類統計"
    error_type_count: "    %{type} - %{count} 通 (%{percent}%)"
    failed_files_list: "    失敗ファイル一覧:"
    failed_file_item: "        - %{file}"
    parse_duration: "    メール解析総時間: %{seconds}秒（全プロセス合計）、QPS: %{qps}通/秒"
    send_duration: "    メール送信総時間: %{seconds}秒（全プロセス合計）、QPS: %{qps}通/秒"
    actual_duration: "    実際の総時間: %{seconds}秒、QPS: %{qps}通/秒"

# ===== CLI メインメッセージ =====
cli_main:
  starting_round: "ラウンド %{current}/%{total} を開始"
  round_completed: "ラウンド %{round} 完了！"
  round_failed: "ラウンド %{round} 失敗: %{error}"
