  guide:
    title: "RSendMail 사용자 가이드"
    desc: "대규모 이메일 시스템을 부드럽게 사용할 수 있는 방법을 확인하세요."
    smtp_title: "1. SMTP 연결 설정"
    smtp_desc: "<p class=\"leading-relaxed\">이 영역은 여러분의 이메일 서버에 접근하기 위한 공간입니다. <strong>서버 주소</strong>와 <strong>포트</strong>는 절대적으로 필요한 값입니다. 서버가 인증을 시도할 경우, <strong>인증 필요</strong>에 체크하시고 비밀번호를 넣어주세요. 보안이 강력하다면 <strong class=\"text-indigo-600 dark:text-indigo-400\">TLS 사용</strong>은 필수적입니다.</p>"
    modes_title: "2. 대상 경로와 파일 선택"
    modes_desc: "<ul class=\"list-disc pl-5 space-y-2.5 leading-relaxed\"><li><strong>EML 일괄 배포:</strong> 템플릿에 극도로 적합합니다. 수많은 <code class=\"bg-white dark:bg-slate-950 px-1 py-0.5 rounded border border-slate-200 dark:border-slate-800\">.eml</code> 모음파일 위치를 읽어 네이티브 상태로 출력합니다.</li><li><strong>단일 텍스트/파일:</strong> 발송할 한 가지 파일 형식을 모든 유저 리스트에게 분산되어 재구성됩니다. 모든 정보는 새롭게 구성되어야 합니다.</li><li><strong>디렉토리 파일:</strong> 대상 폴더 내에 있는 모든 파일을 연속적인 첨부방식 형태로 제공합니다.</li></ul>"
    adv_title: "3. 트래픽/병렬 성능 제어"
    adv_desc: "<p class=\"leading-relaxed\">대용량 작업에서, RSendMail은 비동기 파티셔닝에 완벽합니다. <strong>스레드 수</strong>를 조절해 컴퓨터를 통제할 수 있으며, <strong class=\"text-indigo-600 dark:text-indigo-400\">배치 규격</strong>을 통한 IP 스팸 규제를 회피할 수 있습니다. <strong>비밀 이메일 사용</strong>은 서버에 가상 이메일을 매칭시켜 보냅니다.</p>"
    loop_title: "4. 재시도 관리와 루프 동작"
    loop_desc: "<p class=\"leading-relaxed\"><strong>무한반복</strong>을 해제하여 목표량을 달성한 후 조용히 엔진을 시스템 다운할 수 있습니다. <strong>순환 대기</strong> 옵션은 서버와의 통신 지연시간을 넉넉히 가져 스팸차단을 피하며, <strong class=\"text-indigo-600 dark:text-indigo-400\">재시도 시간</strong>은 실패하는 SMTP 채널에 재차 접속을 찌르게 됩니다.</p>"

