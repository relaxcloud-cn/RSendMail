name: Auto-add to M01
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/relaxcloud-cn/projects/15
          github-token: ${{ secrets.GITHUB_TOKEN }}
